<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Ferretería De La Rosa</title>
    <link rel="stylesheet" href="Css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Ferretería <span>De La Rosa</span></h1>
            <p>Ingresa a tu cuenta</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
                <div class="error-message" id="email-error">Ingresa un correo válido</div>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                <div class="error-message" id="password-error">La contraseña debe tener al menos 6 caracteres</div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> Recordar sesión
                </label>
            </div>

            <button type="submit" class="login-btn">Iniciar sesión</button>

            <div class="register-link">
                ¿No tienes una cuenta? <a href="Registro.html">Regístrate aquí</a>
            </div>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
