<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Ferretería y Pintura</title>
    <link rel="stylesheet" href="Css/regis.css">
</head>
<body>
    <header>
        <div class="logo">Ferretería <span>Rosa</span></div>
        <a href="index.html" class="nav-link">Volver al Inicio</a>
    </header>

    <div class="container">
        <form id="registroForm">
            <div class="form-title">
                <h2>Crear una cuenta</h2>
                <p>Únete a nuestra comunidad</p>
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
                    <div class="error-message" id="nombre-error">El nombre es requerido</div>
                </div>
                
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
                    <div class="error-message" id="email-error">Ingresa un correo válido</div>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
                    <div class="password-strength">
                        <div class="strength-meter" id="strength-meter"></div>
                    </div>
                    <div class="error-message" id="password-error">La contraseña debe tener al menos 8 caracteres</div>
                </div>
                
                <div class="form-group">
                    <label for="confirmar">Confirmar contraseña</label>
                    <input type="password" id="confirmar" name="confirmar" placeholder="Repite tu contraseña" required>
                    <div class="error-message" id="confirmar-error">Las contraseñas no coinciden</div>
                </div>
                
                <button type="submit" class="submit-btn">Registrarse</button>
            </div>
        </form>
    </div>

    <script src="Js/Registro.js">
        
    </script>
</body>
</html>
